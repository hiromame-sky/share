<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUICK P2P</title>
  <link rel="icon" href="/share/favicon.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .code-char { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .animate-pulse-soft { animation: pulse-soft 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        input, textarea { font-size: 16px !important; }
        .progress-bar { transition: width 0.3s ease; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col">

    <div class="flex-grow w-full max-w-4xl mx-auto px-4 py-6 md:px-8 md:py-10">
        <!-- Header -->
        <header class="flex items-center justify-between mb-8 md:mb-12">
            <div class="flex items-center gap-2 md:gap-3">
                <div class="w-10 h-10 md:w-12 md:h-12 bg-yellow-600 rounded-xl md:rounded-2xl flex items-center justify-center text-white shadow-lg">
                    <i data-lucide="zap" class="w-5 h-5 md:w-6 md:h-6"></i>
                </div>
                <h1 class="text-xl md:text-2xl font-black tracking-tight italic">QUICK P2P</h1>
            </div>
            <div id="connection-status" class="flex items-center gap-2 bg-white px-3 py-1.5 md:px-4 md:py-2 rounded-full border border-slate-200 shadow-sm transition-all">
                <span id="status-dot" class="w-2 h-2 rounded-full bg-slate-300"></span>
                <span id="status-text" class="text-[10px] md:text-xs font-bold text-slate-500 uppercase tracking-tighter">Disconnected</span>
            </div>
        </header>

        <!-- Main Dashboard -->
        <main id="main-ui" class="w-full">
            <!-- Setup Section -->
            <section id="setup-view" class="space-y-6 max-w-lg mx-auto md:max-w-none">
                <div class="bg-white rounded-[2rem] md:rounded-[3rem] p-6 md:p-16 shadow-xl shadow-slate-200/50 border border-slate-100 text-center">
                    <h2 class="text-2xl md:text-4xl font-black mb-3 leading-tight">爆速でつなぐ</h2>
                    <p class="text-slate-400 mb-8 md:mb-12 text-sm md:text-base font-medium">安定した大容量ファイル送信に対応。データは端末間で直接移動します。</p>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6 items-stretch">
                        <button id="host-trigger" class="group relative bg-yellow-600 text-white p-6 md:p-10 rounded-3xl font-bold transition-all active:scale-95 flex flex-col items-center justify-center gap-3">
                            <i data-lucide="plus-circle" class="w-8 h-8 md:w-10 md:h-10 group-hover:scale-110 transition-transform"></i>
                            <span class="text-base md:text-lg">新しい接続を作成</span>
                        </button>

                        <div class="flex flex-col gap-3">
                            <input id="join-code-input" type="text" inputmode="numeric" maxlength="8" placeholder="8桁のコードを入力" 
                                class="w-full p-5 md:p-6 bg-slate-100 border-none rounded-3xl text-center text-xl md:text-2xl font-black tracking-[0.2em] focus:bg-white outline-none transition-all placeholder:tracking-normal placeholder:text-slate-300">
                            <button id="join-trigger" class="w-full py-4 md:py-5 bg-slate-900 text-white rounded-3xl font-bold active:scale-95 transition-all flex items-center justify-center gap-2">
                                <span>コードで参加</span>
                                <i data-lucide="arrow-right" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Loading View -->
            <section id="loading-view" class="hidden py-16 md:py-24 text-center">
                <div class="inline-block p-5 bg-yellow-50 text-yellow-600 rounded-full mb-6 animate-spin">
                    <i data-lucide="loader-2" class="w-10 h-10"></i>
                </div>
                <h3 id="loading-title" class="text-xl md:text-2xl font-bold mb-2">接続待機中...</h3>
                <p id="loading-msg" class="text-sm md:text-base text-slate-400">ネットワークの状態を確認しています。</p>
                <button onclick="terminateAll(true)" class="mt-8 text-xs md:text-sm font-bold text-slate-400 underline decoration-slate-200">キャンセル</button>
            </section>

            <!-- Active Connection View -->
            <section id="connected-view" class="hidden space-y-4 md:space-y-6">
                <div class="bg-white rounded-[2rem] p-5 md:p-8 shadow-sm border border-slate-100">
                    <div class="flex items-center justify-between mb-4">
                        <span class="text-[10px] md:text-xs font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                            <i data-lucide="message-square" class="w-3 h-3"></i> Sync Notes
                        </span>
                        <button onclick="copyAllText()" class="text-[10px] md:text-xs font-bold px-3 py-1.5 bg-slate-100 rounded-full active:bg-slate-200 transition-all uppercase">Copy All</button>
                    </div>
                    <textarea id="sync-textarea" placeholder="ここに書いた内容は即座に相手に反映されます..." 
                        class="w-full h-48 md:h-64 bg-transparent border-none focus:ring-0 text-slate-700 leading-relaxed placeholder:text-slate-300 resize-none outline-none shadow-none"></textarea>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 md:gap-6">
                    <div id="drop-zone" class="bg-white rounded-[2rem] p-8 border-2 border-dashed border-slate-100 hover:border-yellow-300 hover:bg-yellow-50/30 transition-all flex flex-col items-center justify-center gap-3 cursor-pointer group">
                        <input type="file" id="file-input" class="hidden">
                        <div class="w-12 h-12 bg-yellow-50 text-yellow-500 rounded-2xl flex items-center justify-center group-hover:scale-110 transition-transform">
                            <i data-lucide="upload-cloud" class="w-6 h-6"></i>
                        </div>
                        <span id="drop-zone-text" class="text-sm font-bold text-slate-500 group-hover:text-yellow-600 text-center">ファイルを送信</span>
                        <div id="upload-progress-container" class="w-full h-1 bg-slate-100 rounded-full mt-2 hidden overflow-hidden">
                            <div id="upload-progress-bar" class="progress-bar h-full bg-yellow-500 w-0"></div>
                        </div>
                    </div>
                    <div id="file-list" class="space-y-3"></div>
                </div>
                
                <div class="pt-10 text-center">
                    <button onclick="terminateAll(true)" class="text-[10px] md:text-xs font-black text-slate-300 hover:text-red-400 uppercase tracking-[0.3em] transition-colors flex items-center justify-center gap-2 mx-auto">
                        <i data-lucide="log-out" class="w-3 h-3"></i> Terminate Connection
                    </button>
                </div>
            </section>
        </main>
    </div>

    <!-- Code Overlay -->
    <div id="code-overlay" class="fixed inset-0 bg-yellow-600/95 backdrop-blur-xl hidden items-center justify-center p-4 z-50">
        <div class="text-center text-white max-w-md w-full">
            <h3 class="text-[10px] font-black uppercase tracking-[0.4em] mb-6 opacity-70">Pairing Code</h3>
            <div id="display-host-code" class="text-5xl md:text-7xl font-black tracking-tighter mb-8 code-char">---- ----</div>
            <div id="host-qrcode-container" class="bg-white p-3 rounded-[2rem] inline-block mb-8 shadow-2xl">
                <div id="host-qrcode"></div>
            </div>
            <button onclick="hideOverlay()" class="w-full max-w-xs py-4 bg-white/10 hover:bg-white/20 rounded-2xl font-bold transition-all mx-auto block border border-white/20">
                閉じる
            </button>
        </div>
    </div>

    <script>
        let peer = null;
        let conn = null;
        let isTerminating = false;
        const SESSION_KEY = 'p2p_reconnect_session';
        const SESSION_TIMEOUT = 5 * 60 * 1000; // 5分間維持
        const CHUNK_SIZE = 16384; 
        let receivingFiles = {};

        function showView(id) {
            ['setup-view', 'loading-view', 'connected-view'].forEach(v => {
                document.getElementById(v).classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
        }

        function hideOverlay() {
            document.getElementById('code-overlay').classList.replace('flex', 'hidden');
        }

        // --- Session Management ---
        function saveSession(role, myId, targetId = null) {
            const session = {
                role,
                myId,
                targetId,
                timestamp: Date.now()
            };
            sessionStorage.setItem(SESSION_KEY, JSON.stringify(session));
        }

        function clearSession() {
            sessionStorage.removeItem(SESSION_KEY);
            document.getElementById('join-code-input').value = '';
            document.getElementById('file-list').innerHTML = '';
            document.getElementById('sync-textarea').value = '';
        }

        function getValidSession() {
            const raw = sessionStorage.getItem(SESSION_KEY);
            if (!raw) return null;
            const session = JSON.parse(raw);
            if (Date.now() - session.timestamp > SESSION_TIMEOUT) {
                clearSession();
                return null;
            }
            return session;
        }

        // --- Peer & Connection Cleanup ---
        function cleanupPeer() {
            if (conn) {
                conn.off('open'); conn.off('data'); conn.off('close'); conn.off('error');
                conn.close();
                conn = null;
            }
            if (peer) {
                peer.off('open'); peer.off('connection'); peer.off('error'); peer.off('disconnected');
                peer.destroy();
                peer = null;
            }
            receivingFiles = {};
            document.getElementById('status-dot').className = 'w-2 h-2 rounded-full bg-slate-300';
            document.getElementById('status-text').innerText = 'Disconnected';
        }

        function setupConnectionListeners() {
            if (!conn) return;

            conn.on('open', () => {
                document.getElementById('status-dot').className = 'w-2 h-2 rounded-full bg-green-500 animate-pulse';
                document.getElementById('status-text').innerText = 'Connected';
                showView('connected-view');
                hideOverlay();
                
                // 接続が確立したらセッションを更新（タイムスタンプ更新）
                const session = getValidSession();
                if (session) saveSession(session.role, session.myId, session.targetId);
            });

            conn.on('data', (data) => {
                if (data.type === 'terminate') terminateAll(false);
                else if (data.type === 'text') {
                    document.getElementById('sync-textarea').value = data.payload;
                } else if (data.type === 'file-chunk') {
                    handleIncomingChunk(data);
                }
            });

            conn.on('close', () => {
                if (!isTerminating) {
                    document.getElementById('status-dot').className = 'w-2 h-2 rounded-full bg-orange-400';
                    document.getElementById('status-text').innerText = 'Connection Lost';
                    // 自動再試行はせずにユーザーに状態を知らせる
                }
            });

            conn.on('error', (err) => {
                console.error("Conn Error:", err);
                terminateAll(true);
            });
        }

        function initiateHost(existingId = null) {
            cleanupPeer();
            isTerminating = false;
            
            const randomCode = existingId || Math.floor(10000000 + Math.random() * 90000000).toString();
            peer = new Peer(randomCode, { debug: 1 });

            peer.on('open', (id) => {
                saveSession('host', id);
                document.getElementById('display-host-code').innerText = id.slice(0,4) + ' ' + id.slice(4,8);
                const qrContainer = document.getElementById("host-qrcode");
                qrContainer.innerHTML = '';
                const shareUrl = window.location.origin + window.location.pathname + `?join=${id}`;
                new QRCode(qrContainer, { text: shareUrl, width: 200, height: 200, colorDark: "#ca8a04" });
                
                // 再接続時はオーバーレイを出さない（既に接続画面にいる可能性があるため）
                if (!existingId) {
                    document.getElementById('code-overlay').classList.replace('hidden', 'flex');
                }
            });

            peer.on('connection', (c) => {
                conn = c;
                setupConnectionListeners();
            });

            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') initiateHost();
                else terminateAll(true);
            });
        }

        function initiateJoin(targetCode = null) {
            cleanupPeer();
            isTerminating = false;

            let code = targetCode || document.getElementById('join-code-input').value.replace(/\s/g, '');
            if (code.length < 8) return;

            showView('loading-view');
            peer = new Peer({ debug: 1 });

            peer.on('open', (myId) => {
                saveSession('join', myId, code);
                conn = peer.connect(code, { reliable: true });
                setupConnectionListeners();
            });

            peer.on('error', (err) => {
                alert("接続に失敗しました。セッションをクリアします。");
                terminateAll(true);
            });
        }

        function terminateAll(isInitiator = false) {
            isTerminating = true;
            if (isInitiator && conn && conn.open) {
                conn.send({ type: 'terminate' });
            }
            
            clearSession();
            cleanupPeer();
            showView('setup-view');
            hideOverlay();
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        // --- File Logic ---
        const fileInput = document.getElementById('file-input');
        document.getElementById('drop-zone').onclick = () => fileInput.click();

        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file || !conn || !conn.open) return;
            const progressContainer = document.getElementById('upload-progress-container');
            const progressBar = document.getElementById('upload-progress-bar');
            const dropZoneText = document.getElementById('drop-zone-text');

            progressContainer.classList.remove('hidden');
            dropZoneText.innerText = "送信中...";
            const totalChunks = Math.ceil(file.size / CHUNK_SIZE);
            const fileId = Math.random().toString(36).substring(2, 9);

            try {
                for (let i = 0; i < totalChunks; i++) {
                    const chunk = file.slice(i * CHUNK_SIZE, (i + 1) * CHUNK_SIZE);
                    const buffer = await chunk.arrayBuffer();
                    if (!conn || !conn.open) break;
                    conn.send({
                        type: 'file-chunk', fileId, fileName: file.name, fileSize: file.size,
                        chunkIndex: i, totalChunks, data: buffer
                    });
                    progressBar.style.width = Math.round(((i + 1) / totalChunks) * 100) + '%';
                }
            } catch (err) { console.error(err); }

            setTimeout(() => {
                progressContainer.classList.add('hidden');
                progressBar.style.width = '0%';
                dropZoneText.innerText = "ファイルを送信";
                addFileToList({ name: file.name, size: file.size, data: URL.createObjectURL(file) }, true);
                fileInput.value = '';
            }, 500);
        };

        function handleIncomingChunk(chunkData) {
            const { fileId, fileName, fileSize, chunkIndex, totalChunks, data } = chunkData;
            if (!receivingFiles[fileId]) {
                receivingFiles[fileId] = { name: fileName, size: fileSize, chunks: new Array(totalChunks), receivedCount: 0 };
            }
            receivingFiles[fileId].chunks[chunkIndex] = data;
            receivingFiles[fileId].receivedCount++;
            if (receivingFiles[fileId].receivedCount === totalChunks) {
                const blob = new Blob(receivingFiles[fileId].chunks);
                addFileToList({ name: fileName, size: fileSize, data: URL.createObjectURL(blob) }, false);
                delete receivingFiles[fileId];
            }
        }

        function addFileToList(file, isMe) {
            const list = document.getElementById('file-list');
            const item = document.createElement('div');
            item.className = "flex items-center justify-between p-4 bg-white border border-slate-100 rounded-3xl shadow-sm";
            item.innerHTML = `
                <div class="flex items-center gap-3 overflow-hidden">
                    <div class="w-10 h-10 ${isMe ? 'bg-yellow-50 text-yellow-500' : 'bg-slate-50 text-slate-400'} rounded-2xl flex items-center justify-center">
                        <i data-lucide="file" class="w-5 h-5"></i>
                    </div>
                    <div class="overflow-hidden">
                        <p class="text-xs font-bold truncate">${file.name}</p>
                        <p class="text-[9px] text-slate-300 uppercase">${(file.size / 1024).toFixed(1)} KB ${isMe ? ' (Sent)' : ''}</p>
                    </div>
                </div>
                <a href="${file.data}" download="${file.name}" class="p-3 text-yellow-600 bg-yellow-50 rounded-2xl active:scale-90 transition-transform">
                    <i data-lucide="download" class="w-4 h-4"></i>
                </a>
            `;
            list.prepend(item);
            lucide.createIcons();
        }

        document.getElementById('sync-textarea').addEventListener('input', (e) => {
            if (conn && conn.open) conn.send({ type: 'text', payload: e.target.value });
        });

        function copyAllText() {
            const area = document.getElementById('sync-textarea');
            area.select();
            document.execCommand('copy');
            const btn = event.currentTarget;
            const old = btn.innerText;
            btn.innerText = "COPIED!";
            setTimeout(() => btn.innerText = old, 2000);
        }

        // --- Initialization ---
        window.onload = () => {
            lucide.createIcons();
            document.getElementById('host-trigger').onclick = () => initiateHost();
            document.getElementById('join-trigger').onclick = () => initiateJoin();
            
            // 1. URLパラメータのチェック（新規参加）
            const params = new URLSearchParams(window.location.search);
            const joinCode = params.get('join');
            
            // 2. セッション情報のチェック（再接続）
            const session = getValidSession();

            if (joinCode) {
                document.getElementById('join-code-input').value = joinCode;
                initiateJoin(joinCode);
            } else if (session) {
                console.log("Attempting to reconnect session...", session);
                if (session.role === 'host') {
                    initiateHost(session.myId);
                } else if (session.role === 'join' && session.targetId) {
                    initiateJoin(session.targetId);
                }
            }
        };
    </script>
</body>
</html>
