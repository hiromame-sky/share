<!DOCTYPE html>

<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUICK P2P</title>
    <link rel="icon" href="/share/favicon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --accent: #f0a500;
            --accent-dark: #c47f00;
            --bg: #0d0f14;
            --surface: #161922;
            --surface2: #1e2330;
            --border: #2a3042;
            --text: #e8eaf0;
            --text-muted: #6b7280;
            --text-dim: #3a4155;
            --green: #22c55e;
            --orange: #f97316;
            --red: #ef4444;
            --radius: 20px;
            --font-mono: 'Space Mono', monospace;
            --font-body: 'DM Sans', sans-serif;
        }


    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        font-family: var(--font-body);
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        -webkit-tap-highlight-color: transparent;
        overflow-x: hidden;
    }

    /* ─── Subtle grid background ─── */
    body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image:
            linear-gradient(rgba(240,165,0,0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(240,165,0,0.03) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
        z-index: 0;
    }

    .app-wrapper {
        position: relative;
        z-index: 1;
        flex: 1;
        width: 100%;
        max-width: 960px;
        margin: 0 auto;
        padding: 20px 16px 40px;
    }

    /* ─── Header ─── */
    header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 32px;
    }

    .logo {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .logo-icon {
        width: 40px; height: 40px;
        background: var(--accent);
        border-radius: 12px;
        display: flex; align-items: center; justify-content: center;
        color: #000;
        box-shadow: 0 0 20px rgba(240,165,0,0.4);
    }

    .logo-text {
        font-family: var(--font-mono);
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 0.05em;
        color: var(--text);
    }

    .logo-text span { color: var(--accent); }

    /* ─── Connection Status Badge ─── */
    .status-badge {
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 100px;
        padding: 6px 14px;
        font-family: var(--font-mono);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.1em;
        color: var(--text-muted);
        transition: all 0.3s;
    }

    .status-badge.connected { border-color: var(--green); color: var(--green); }
    .status-badge.reconnecting { border-color: var(--orange); color: var(--orange); }
    .status-badge.error { border-color: var(--red); color: var(--red); }

    .status-dot {
        width: 7px; height: 7px;
        border-radius: 50%;
        background: var(--text-dim);
        transition: all 0.3s;
    }

    .status-dot.connected { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse-glow 2s infinite; }
    .status-dot.reconnecting { background: var(--orange); animation: blink 1s infinite; }
    .status-dot.error { background: var(--red); }

    @keyframes pulse-glow {
        0%, 100% { opacity: 1; box-shadow: 0 0 6px var(--green); }
        50% { opacity: 0.6; box-shadow: 0 0 12px var(--green); }
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(16px); }
        to { opacity: 1; transform: translateY(0); }
    }
    @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
    }

    .anim-fade-up { animation: fadeUp 0.4s ease both; }

    /* ─── Cards ─── */
    .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 24px;
    }

    .card-lg { padding: 32px; }

    /* ─── Setup View ─── */
    #setup-view { animation: fadeUp 0.4s ease both; }

    .setup-hero {
        text-align: center;
        padding: 48px 24px 40px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        margin-bottom: 16px;
    }

    .setup-hero h2 {
        font-size: clamp(28px, 6vw, 48px);
        font-weight: 900;
        letter-spacing: -0.02em;
        margin-bottom: 10px;
        color: var(--text);
    }

    .setup-hero h2 em {
        font-style: normal;
        color: var(--accent);
    }

    .setup-hero p {
        color: var(--text-muted);
        font-size: 14px;
        max-width: 360px;
        margin: 0 auto 36px;
        line-height: 1.7;
    }

    .setup-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        max-width: 500px;
        margin: 0 auto;
    }

    @media (max-width: 480px) {
        .setup-grid { grid-template-columns: 1fr; }
    }

    .btn-primary {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        background: var(--accent);
        color: #000;
        border: none;
        border-radius: 16px;
        padding: 28px 20px;
        font-family: var(--font-body);
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
    }

    .btn-primary:hover { background: #fbbf24; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(240,165,0,0.3); }
    .btn-primary:active { transform: scale(0.97); }

    .join-panel {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .code-input {
        width: 100%;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 18px 16px;
        text-align: center;
        font-family: var(--font-mono);
        font-size: clamp(18px, 5vw, 24px);
        font-weight: 700;
        letter-spacing: 0.2em;
        color: var(--text);
        outline: none;
        transition: all 0.2s;
        -webkit-appearance: none;
    }

    .code-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(240,165,0,0.15); }
    .code-input::placeholder { color: var(--text-dim); letter-spacing: 0.05em; font-size: 13px; }

    .btn-secondary {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        background: var(--surface2);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 16px;
        font-family: var(--font-body);
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
    }

    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
    .btn-secondary:active { transform: scale(0.97); }

    /* ─── Loading View ─── */
    #loading-view { text-align: center; padding: 80px 20px; }

    .spinner {
        width: 56px; height: 56px;
        border: 3px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 24px;
    }

    #loading-view h3 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    #loading-view p { color: var(--text-muted); font-size: 14px; }

    .reconnect-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: rgba(249,115,22,0.1);
        border: 1px solid rgba(249,115,22,0.3);
        border-radius: 100px;
        padding: 4px 12px;
        font-size: 11px;
        font-weight: 700;
        color: var(--orange);
        margin-bottom: 16px;
        font-family: var(--font-mono);
        letter-spacing: 0.08em;
    }

    .btn-ghost {
        background: none;
        border: none;
        color: var(--text-muted);
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        text-decoration: underline;
        text-decoration-color: var(--border);
        margin-top: 28px;
        font-family: var(--font-body);
        transition: color 0.2s;
    }

    .btn-ghost:hover { color: var(--red); }

    /* ─── Connected View ─── */
    #connected-view { display: none; gap: 16px; flex-direction: column; }
    #connected-view.visible { display: flex; animation: fadeUp 0.35s ease both; }

    /* Transfer Progress Bar (top of connected view) */
    .transfer-status-bar {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 16px 20px;
        display: flex;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
    }

    .transfer-stat {
        display: flex;
        flex-direction: column;
        gap: 2px;
    }

    .transfer-stat-label {
        font-family: var(--font-mono);
        font-size: 9px;
        color: var(--text-muted);
        letter-spacing: 0.1em;
        text-transform: uppercase;
    }

    .transfer-stat-value {
        font-family: var(--font-mono);
        font-size: 15px;
        font-weight: 700;
        color: var(--text);
    }

    .transfer-stat-value.accent { color: var(--accent); }
    .transfer-stat-value.green { color: var(--green); }

    .transfer-stat-divider {
        width: 1px;
        height: 28px;
        background: var(--border);
        flex-shrink: 0;
    }

    .transfer-stat-spacer { flex: 1; }

    /* Sync textarea */
    .sync-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }

    .sync-card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 20px;
        border-bottom: 1px solid var(--border);
    }

    .sync-card-header-left {
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: var(--font-mono);
        font-size: 10px;
        font-weight: 700;
        color: var(--text-muted);
        letter-spacing: 0.1em;
        text-transform: uppercase;
    }

    .btn-mini {
        font-size: 10px;
        font-weight: 700;
        padding: 5px 12px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 100px;
        color: var(--text-muted);
        cursor: pointer;
        font-family: var(--font-mono);
        letter-spacing: 0.05em;
        transition: all 0.2s;
    }

    .btn-mini:hover { border-color: var(--accent); color: var(--accent); }

    #sync-textarea {
        width: 100%;
        min-height: 160px;
        background: transparent;
        border: none;
        outline: none;
        resize: none;
        color: var(--text);
        font-family: var(--font-body);
        font-size: 14px;
        line-height: 1.8;
        padding: 20px;
    }

    #sync-textarea::placeholder { color: var(--text-dim); }

    .sync-indicator {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 20px;
        border-top: 1px solid var(--border);
        font-size: 10px;
        font-family: var(--font-mono);
        color: var(--text-dim);
        letter-spacing: 0.06em;
    }

    .sync-dot {
        width: 5px; height: 5px;
        border-radius: 50%;
        background: var(--text-dim);
        transition: all 0.2s;
    }

    .sync-dot.syncing { background: var(--accent); box-shadow: 0 0 6px var(--accent); }

    /* ─── File Area ─── */
    .file-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
    }

    @media (max-width: 600px) {
        .file-grid { grid-template-columns: 1fr; }
    }

    /* Drop Zone */
    .drop-zone {
        background: var(--surface);
        border: 2px dashed var(--border);
        border-radius: var(--radius);
        padding: 40px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        cursor: pointer;
        transition: all 0.2s;
        text-align: center;
        min-height: 180px;
        position: relative;
        overflow: hidden;
    }

    .drop-zone:hover { border-color: var(--accent); background: rgba(240,165,0,0.04); }
    .drop-zone.dragging { border-color: var(--accent); background: rgba(240,165,0,0.08); transform: scale(1.01); }
    .drop-zone.sending { cursor: not-allowed; }

    .drop-icon {
        width: 48px; height: 48px;
        background: rgba(240,165,0,0.1);
        border-radius: 14px;
        display: flex; align-items: center; justify-content: center;
        color: var(--accent);
        transition: transform 0.2s;
    }

    .drop-zone:hover .drop-icon { transform: scale(1.1); }

    .drop-label {
        font-size: 13px;
        font-weight: 700;
        color: var(--text-muted);
    }

    .drop-sublabel {
        font-size: 11px;
        color: var(--text-dim);
    }

    /* Upload Progress */
    .upload-progress {
        position: absolute;
        bottom: 0; left: 0; right: 0;
        padding: 0 16px 14px;
    }

    .upload-progress-track {
        height: 3px;
        background: var(--border);
        border-radius: 100px;
        overflow: hidden;
        margin-bottom: 6px;
    }

    .upload-progress-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--accent), #fbbf24);
        border-radius: 100px;
        width: 0%;
        transition: width 0.2s;
        background-size: 200% 100%;
    }

    .upload-progress-fill.animate { animation: shimmer 1.5s linear infinite; }

    .upload-progress-label {
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--text-muted);
        text-align: center;
        display: flex;
        justify-content: space-between;
    }

    /* Receive progress banner */
    .receive-progress-banner {
        display: none;
        background: rgba(240,165,0,0.06);
        border: 1px solid rgba(240,165,0,0.2);
        border-radius: 12px;
        padding: 10px 14px;
        margin-top: 8px;
    }

    .receive-progress-banner.visible { display: block; }

    .receive-progress-label {
        display: flex;
        justify-content: space-between;
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--accent);
        margin-bottom: 6px;
    }

    .receive-progress-track {
        height: 3px;
        background: var(--border);
        border-radius: 100px;
        overflow: hidden;
    }

    .receive-progress-fill {
        height: 100%;
        background: var(--accent);
        border-radius: 100px;
        width: 0%;
        transition: width 0.15s;
    }

    /* File List */
    .file-list-panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
        min-height: 180px;
    }

    .file-list-header {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        font-family: var(--font-mono);
        font-size: 10px;
        font-weight: 700;
        color: var(--text-muted);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .file-count-badge {
        background: var(--surface2);
        border-radius: 100px;
        padding: 2px 8px;
        font-size: 9px;
    }

    .file-list-empty {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 32px;
        color: var(--text-dim);
        font-size: 12px;
    }

    #file-list-items { overflow-y: auto; max-height: 320px; }

    .file-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        transition: background 0.15s;
        animation: fadeUp 0.3s ease both;
    }

    .file-item:last-child { border-bottom: none; }
    .file-item:hover { background: var(--surface2); }

    .file-item-icon {
        width: 36px; height: 36px;
        border-radius: 10px;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
        font-size: 11px;
        font-weight: 700;
        font-family: var(--font-mono);
    }

    .file-item-icon.sent { background: rgba(240,165,0,0.1); color: var(--accent); }
    .file-item-icon.recv { background: rgba(34,197,94,0.1); color: var(--green); }

    .file-item-info { flex: 1; min-width: 0; }

    .file-item-name {
        font-size: 12px;
        font-weight: 700;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: var(--text);
    }

    .file-item-meta {
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--text-muted);
        margin-top: 2px;
    }

    .btn-dl {
        width: 32px; height: 32px;
        border-radius: 10px;
        background: var(--surface2);
        border: 1px solid var(--border);
        display: flex; align-items: center; justify-content: center;
        color: var(--accent);
        text-decoration: none;
        transition: all 0.15s;
        flex-shrink: 0;
    }

    .btn-dl:hover { background: var(--accent); color: #000; border-color: var(--accent); }

    /* ─── Session Info strip ─── */
    .session-strip {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
    }

    .session-code-display {
        font-family: var(--font-mono);
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 0.15em;
        color: var(--accent);
    }

    .session-label {
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--text-dim);
        letter-spacing: 0.1em;
        text-transform: uppercase;
    }

    .btn-show-qr {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: rgba(240,165,0,0.1);
        border: 1px solid rgba(240,165,0,0.2);
        border-radius: 10px;
        padding: 6px 12px;
        font-size: 11px;
        font-weight: 700;
        color: var(--accent);
        cursor: pointer;
        transition: all 0.2s;
        font-family: var(--font-mono);
    }

    .btn-show-qr:hover { background: rgba(240,165,0,0.18); }

    /* ─── Terminate Button ─── */
    .btn-terminate {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        background: none;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px 20px;
        font-size: 12px;
        font-weight: 700;
        color: var(--text-muted);
        cursor: pointer;
        font-family: var(--font-mono);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        transition: all 0.2s;
        width: 100%;
    }

    .btn-terminate:hover { border-color: var(--red); color: var(--red); background: rgba(239,68,68,0.04); }

    /* ─── Code Overlay ─── */
    #code-overlay {
        position: fixed;
        inset: 0;
        background: rgba(13,15,20,0.95);
        backdrop-filter: blur(20px);
        display: none;
        align-items: center;
        justify-content: center;
        padding: 20px;
        z-index: 100;
    }

    #code-overlay.visible { display: flex; animation: fadeUp 0.3s ease both; }

    .overlay-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 28px;
        padding: 40px 32px;
        text-align: center;
        width: 100%;
        max-width: 360px;
    }

    .overlay-label {
        font-family: var(--font-mono);
        font-size: 10px;
        font-weight: 700;
        color: var(--text-muted);
        letter-spacing: 0.2em;
        text-transform: uppercase;
        margin-bottom: 20px;
    }

    .overlay-code {
        font-family: var(--font-mono);
        font-size: clamp(36px, 10vw, 56px);
        font-weight: 700;
        letter-spacing: 0.12em;
        color: var(--accent);
        margin-bottom: 28px;
    }

    .qr-wrapper {
        background: #fff;
        border-radius: 20px;
        padding: 16px;
        display: inline-flex;
        margin-bottom: 28px;
        box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }

    .overlay-share-url {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--text-muted);
        word-break: break-all;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 14px;
        margin-bottom: 20px;
        text-align: left;
        cursor: pointer;
        transition: border-color 0.2s;
    }

    .overlay-share-url:hover { border-color: var(--accent); }

    .btn-overlay-close {
        width: 100%;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px;
        font-size: 14px;
        font-weight: 700;
        color: var(--text);
        cursor: pointer;
        font-family: var(--font-body);
        transition: all 0.2s;
    }

    .btn-overlay-close:hover { border-color: var(--accent); color: var(--accent); }

    /* ─── Toast Notification ─── */
    .toast-container {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 200;
        display: flex;
        flex-direction: column-reverse;
        gap: 8px;
        pointer-events: none;
        width: calc(100% - 32px);
        max-width: 380px;
    }

    .toast {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 12px 16px;
        font-size: 13px;
        font-weight: 700;
        color: var(--text);
        display: flex;
        align-items: center;
        gap: 10px;
        animation: toastIn 0.3s ease both;
        pointer-events: all;
        box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }

    .toast.success { border-color: var(--green); }
    .toast.warning { border-color: var(--orange); }
    .toast.error { border-color: var(--red); }
    .toast.info { border-color: var(--accent); }

    .toast-icon { font-size: 16px; }

    @keyframes toastIn {
        from { opacity: 0; transform: translateY(16px) scale(0.96); }
        to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes toastOut {
        from { opacity: 1; transform: translateY(0) scale(1); }
        to { opacity: 0; transform: translateY(16px) scale(0.96); }
    }

    /* ─── Misc ─── */
    input, textarea { font-size: 16px !important; }

    .hidden { display: none !important; }

    @media (min-width: 640px) {
        .app-wrapper { padding: 32px 32px 60px; }
        header { margin-bottom: 48px; }
    }

    @media (min-width: 960px) {

    }
</style>


</head>

            <!-- Terminate -->

<!-- ── Code Overlay ── -->

<!-- ── Toast ── -->
<div class="toast-container" id="toast-container"></div>

<script>
// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
let peer = null;
let conn = null;
let isTerminating = false;
let isHost = false;
let myPeerId = null;
let reconnectTimer = null;
let reconnectAttempts = 0;
const MAX_RECONNECT = 8;
const RECONNECT_DELAY_BASE = 1500;

const SESSION_KEY = 'qp2p_session_v2';
const SESSION_TIMEOUT = 30 * 60 * 1000; // 30分

// チャンク設定 - 大容量対応
const CHUNK_SIZE = 65536; // 64KB chunks
const SEND_QUEUE_MAX = 16; // バックプレッシャー制御

let receivingFiles = {};
let totalSent = 0;
let totalRecv = 0;
let fileCount = 0;
let speedSamples = [];
let speedTimer = null;
let lastSpeedBytes = 0;
let currentSendQueue = 0;
let isSending = false;
let textSyncTimer = null;

// ═══════════════════════════════════════════════════════
//  VIEW MANAGEMENT
// ═══════════════════════════════════════════════════════
function showView(id) {
    ['setup-view', 'loading-view', 'connected-view'].forEach(v => {
        const el = document.getElementById(v);
        if (v === 'connected-view') {
            el.classList.remove('visible');
            el.style.display = '';
        } else {
            el.classList.add('hidden');
        }
    });

    const target = document.getElementById(id);
    if (id === 'connected-view') {
        target.classList.add('visible');
    } else {
        target.classList.remove('hidden');
    }
}

function showOverlay() {
    document.getElementById('code-overlay').classList.add('visible');
}

function hideOverlay() {
    document.getElementById('code-overlay').classList.remove('visible');
}

// ═══════════════════════════════════════════════════════
//  STATUS
// ═══════════════════════════════════════════════════════
function setStatus(state, text) {
    const badge = document.getElementById('status-badge');
    const dot = document.getElementById('status-dot');
    const label = document.getElementById('status-text');
    badge.className = 'status-badge ' + state;
    dot.className = 'status-dot ' + state;
    label.textContent = text;
}

// ═══════════════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════════════
function showToast(message, type = 'info', duration = 3000) {
    const icons = { success: '✓', warning: '⚠', error: '✕', info: '→' };
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerHTML = `<span class="toast-icon">${icons[type]}</span><span>${message}</span>`;
    container.appendChild(toast);
    setTimeout(() => {
        toast.style.animation = 'toastOut 0.3s ease both';
        setTimeout(() => toast.remove(), 300);
    }, duration);
}

// ═══════════════════════════════════════════════════════
//  SESSION MANAGEMENT
// ═══════════════════════════════════════════════════════
function saveSession(role, myId, targetId = null) {
    sessionStorage.setItem(SESSION_KEY, JSON.stringify({
        role, myId, targetId, timestamp: Date.now()
    }));
}

function getValidSession() {
    try {
        const raw = sessionStorage.getItem(SESSION_KEY);
        if (!raw) return null;
        const s = JSON.parse(raw);
        if (Date.now() - s.timestamp > SESSION_TIMEOUT) { clearSession(); return null; }
        return s;
    } catch { return null; }
}

function clearSession() {
    sessionStorage.removeItem(SESSION_KEY);
    document.getElementById('join-code-input').value = '';
    document.getElementById('file-list-items').innerHTML =
        `<div id="file-list-empty" class="file-list-empty">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text-dim)"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
            ファイルはまだありません
        </div>`;
    document.getElementById('sync-textarea').value = '';
    totalSent = 0; totalRecv = 0; fileCount = 0;
    updateStats();
    document.getElementById('file-count-badge').textContent = '0';
}

// ═══════════════════════════════════════════════════════
//  PEER CLEANUP
// ═══════════════════════════════════════════════════════
function cleanupPeer() {
    clearTimeout(reconnectTimer);
    if (conn) {
        try { conn.off('open'); conn.off('data'); conn.off('close'); conn.off('error'); conn.close(); } catch {}
        conn = null;
    }
    if (peer) {
        try { peer.off('open'); peer.off('connection'); peer.off('error'); peer.off('disconnected'); peer.destroy(); } catch {}
        peer = null;
    }
    receivingFiles = {};
    isSending = false;
    currentSendQueue = 0;
    clearInterval(speedTimer);
    speedTimer = null;
    setStatus('', 'OFFLINE');
}

// ═══════════════════════════════════════════════════════
//  PEER CONFIG - 複数のSTUN/TURNサーバーで安定化
// ═══════════════════════════════════════════════════════
const PEER_CONFIG = {
    debug: 0,
    config: {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
            { urls: 'stun:stun2.l.google.com:19302' },
            { urls: 'stun:stun.cloudflare.com:3478' },
            { urls: 'stun:stun.relay.metered.ca:80' },
        ],
        iceCandidatePoolSize: 10,
        iceTransportPolicy: 'all',
    }
};

// ═══════════════════════════════════════════════════════
//  CONNECTION LISTENERS
// ═══════════════════════════════════════════════════════
function setupConnectionListeners() {
    if (!conn) return;

    conn.on('open', () => {
        reconnectAttempts = 0;
        setStatus('connected', 'CONNECTED');
        showView('connected-view');
        hideOverlay();

        const session = getValidSession();
        if (session) saveSession(session.role, session.myId, session.targetId);

        startSpeedMeter();
        showToast('接続が確立されました', 'success');
    });

    conn.on('data', (data) => {
        if (!data || !data.type) return;
        switch (data.type) {
            case 'terminate':
                showToast('相手が接続を切断しました', 'warning');
                terminateAll(false);
                break;
            case 'text':
                document.getElementById('sync-textarea').value = data.payload;
                flashSyncDot();
                break;
            case 'file-chunk':
                handleIncomingChunk(data);
                break;
            case 'ping':
                conn.send({ type: 'pong', ts: data.ts });
                break;
        }
    });

    conn.on('close', () => {
        if (isTerminating) return;
        setStatus('reconnecting', 'RECONNECTING');
        showToast('接続が切断されました。再接続を試みています...', 'warning', 5000);
        scheduleReconnect();
    });

    conn.on('error', (err) => {
        console.warn('Conn error:', err);
        if (!isTerminating) {
            setStatus('error', 'ERROR');
            scheduleReconnect();
        }
    });
}

// ═══════════════════════════════════════════════════════
//  RECONNECTION
// ═══════════════════════════════════════════════════════
function scheduleReconnect() {
    if (isTerminating || reconnectAttempts >= MAX_RECONNECT) {
        if (reconnectAttempts >= MAX_RECONNECT) {
            showToast('再接続に失敗しました。セッションを終了します。', 'error', 5000);
            terminateAll(true);
        }
        return;
    }
    reconnectAttempts++;
    const delay = Math.min(RECONNECT_DELAY_BASE * Math.pow(1.5, reconnectAttempts - 1), 15000);
    document.getElementById('reconnect-badge').classList.remove('hidden');
    showView('loading-view');
    document.getElementById('loading-title').textContent = `再接続中... (${reconnectAttempts}/${MAX_RECONNECT})`;
    document.getElementById('loading-msg').textContent = `${Math.round(delay/1000)}秒後に再試行します。`;

    reconnectTimer = setTimeout(() => {
        const session = getValidSession();
        if (!session) { terminateAll(true); return; }
        if (session.role === 'host') {
            reconnectAsHost(session.myId);
        } else {
            reconnectAsJoin(session.targetId);
        }
    }, delay);
}

function reconnectAsHost(existingId) {
    if (conn) { try { conn.close(); } catch {} conn = null; }
    if (!peer || peer.destroyed) {
        peer = new Peer(existingId, PEER_CONFIG);
        peer.on('open', () => {
            document.getElementById('reconnect-badge').classList.add('hidden');
            setStatus('reconnecting', 'WAITING');
            showView('loading-view');
            document.getElementById('loading-title').textContent = '相手の再接続を待っています...';
            document.getElementById('loading-msg').textContent = 'ページを離れてもセッションは維持されます。';
        });
        peer.on('connection', (c) => {
            conn = c;
            document.getElementById('reconnect-badge').classList.add('hidden');
            setupConnectionListeners();
        });
        peer.on('error', () => scheduleReconnect());
    } else {
        peer.on('connection', (c) => {
            conn = c;
            document.getElementById('reconnect-badge').classList.add('hidden');
            setupConnectionListeners();
        });
    }
}

function reconnectAsJoin(targetId) {
    if (!targetId) { terminateAll(true); return; }
    if (conn) { try { conn.close(); } catch {} conn = null; }

    if (!peer || peer.destroyed) {
        peer = new Peer(PEER_CONFIG);
        peer.on('open', (myId) => {
            saveSession('join', myId, targetId);
            conn = peer.connect(targetId, { reliable: true, serialization: 'binary' });
            setupConnectionListeners();
        });
        peer.on('error', () => scheduleReconnect());
    } else {
        conn = peer.connect(targetId, { reliable: true, serialization: 'binary' });
        setupConnectionListeners();
    }
}

// ═══════════════════════════════════════════════════════
//  HOST
// ═══════════════════════════════════════════════════════
function initiateHost(existingId = null) {
    cleanupPeer();
    isTerminating = false;
    isHost = true;
    reconnectAttempts = 0;
    document.getElementById('reconnect-badge').classList.add('hidden');

    const randomCode = existingId || Math.floor(10000000 + Math.random() * 90000000).toString();
    peer = new Peer(randomCode, PEER_CONFIG);

    showView('loading-view');
    document.getElementById('loading-title').textContent = '接続を準備中...';
    document.getElementById('loading-msg').textContent = 'ネットワークを設定しています。';

    peer.on('open', (id) => {
        myPeerId = id;
        saveSession('host', id);
        const formatted = id.slice(0,4) + ' ' + id.slice(4,8);
        document.getElementById('display-host-code').textContent = formatted;
        document.getElementById('session-code-display').textContent = formatted;
        document.getElementById('session-bar').classList.remove('hidden');

        const shareUrl = `${location.origin}${location.pathname}?join=${id}`;
        document.getElementById('overlay-share-url').textContent = shareUrl;

        const qrContainer = document.getElementById('host-qrcode');
        qrContainer.innerHTML = '';
        new QRCode(qrContainer, { text: shareUrl, width: 180, height: 180, colorDark: '#c47f00', colorLight: '#ffffff' });

        setStatus('reconnecting', 'WAITING');
        document.getElementById('loading-title').textContent = '接続を待っています...';
        document.getElementById('loading-msg').textContent = 'コードまたはQRコードを相手に共有してください。';

        if (!existingId) showOverlay();
    });

    peer.on('connection', (c) => {
        conn = c;
        setupConnectionListeners();
    });

    peer.on('disconnected', () => {
        if (!isTerminating && peer && !peer.destroyed) {
            peer.reconnect();
        }
    });

    peer.on('error', (err) => {
        if (err.type === 'unavailable-id') { initiateHost(); return; }
        console.warn('Peer error:', err);
        if (!isTerminating) scheduleReconnect();
    });
}

// ═══════════════════════════════════════════════════════
//  JOIN
// ═══════════════════════════════════════════════════════
function initiateJoin(targetCode = null) {
    const code = (targetCode || document.getElementById('join-code-input').value.replace(/\s/g, '')).trim();
    if (code.length < 8) { showToast('8桁のコードを入力してください', 'error'); return; }

    cleanupPeer();
    isTerminating = false;
    isHost = false;
    reconnectAttempts = 0;
    document.getElementById('reconnect-badge').classList.add('hidden');
    document.getElementById('session-bar').classList.add('hidden');

    showView('loading-view');
    document.getElementById('loading-title').textContent = '接続中...';
    document.getElementById('loading-msg').textContent = 'ピアを探しています。';

    peer = new Peer(PEER_CONFIG);

    peer.on('open', (myId) => {
        myPeerId = myId;
        saveSession('join', myId, code);
        conn = peer.connect(code, { reliable: true, serialization: 'binary' });
        setupConnectionListeners();
    });

    peer.on('disconnected', () => {
        if (!isTerminating && peer && !peer.destroyed) peer.reconnect();
    });

    peer.on('error', (err) => {
        console.warn('Peer error:', err);
        if (!isTerminating) {
            if (err.type === 'peer-unavailable') {
                showToast('相手が見つかりません。コードを確認してください。', 'error', 5000);
                terminateAll(true);
            } else {
                scheduleReconnect();
            }
        }
    });
}

// ═══════════════════════════════════════════════════════
//  TERMINATE
// ═══════════════════════════════════════════════════════
function terminateAll(isInitiator = false) {
    isTerminating = true;
    if (isInitiator && conn && conn.open) {
        try { conn.send({ type: 'terminate' }); } catch {}
    }
    clearSession();
    cleanupPeer();
    showView('setup-view');
    hideOverlay();
    history.replaceState({}, document.title, location.pathname);
}

// ═══════════════════════════════════════════════════════
//  FILE SENDING - backpressure + speed measurement
// ═══════════════════════════════════════════════════════
document.getElementById('drop-zone').onclick = () => {
    if (!isSending) document.getElementById('file-input').click();
};

// Drag & Drop
const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragging'); });
dz.addEventListener('dragleave', () => dz.classList.remove('dragging'));
dz.addEventListener('drop', e => {
    e.preventDefault();
    dz.classList.remove('dragging');
    const file = e.dataTransfer.files[0];
    if (file) sendFile(file);
});

document.getElementById('file-input').onchange = e => {
    const file = e.target.files[0];
    if (file) sendFile(file);
    e.target.value = '';
};

async function sendFile(file) {
    if (!conn || !conn.open) { showToast('接続されていません', 'error'); return; }
    if (isSending) { showToast('送信中です。完了をお待ちください。', 'warning'); return; }

    isSending = true;
    const progressEl = document.getElementById('upload-progress');
    const fillEl = document.getElementById('upload-progress-fill');
    const pctEl = document.getElementById('upload-pct');
    const nameEl = document.getElementById('upload-file-name');
    const textEl = document.getElementById('drop-zone-text');

    progressEl.classList.remove('hidden');
    fillEl.classList.add('animate');
    textEl.textContent = '送信中...';
    nameEl.textContent = truncate(file.name, 20);

    const totalChunks = Math.ceil(file.size / CHUNK_SIZE);
    const fileId = crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(2);
    let sentBytes = 0;
    const startTime = Date.now();

    try {
        for (let i = 0; i < totalChunks; i++) {
            if (!conn || !conn.open) break;

            // Backpressure: wait if buffer is getting full
            while (conn.dataChannel && conn.dataChannel.bufferedAmount > 1024 * 1024) {
                await sleep(20);
            }

            const chunk = file.slice(i * CHUNK_SIZE, (i + 1) * CHUNK_SIZE);
            const buffer = await chunk.arrayBuffer();

            conn.send({
                type: 'file-chunk', fileId,
                fileName: file.name, fileSize: file.size,
                chunkIndex: i, totalChunks, data: buffer
            });

            sentBytes += buffer.byteLength;
            totalSent += buffer.byteLength;
            updateStats();

            const pct = Math.round(((i + 1) / totalChunks) * 100);
            fillEl.style.width = pct + '%';
            pctEl.textContent = pct + '%';
            nameEl.textContent = `${truncate(file.name,16)} — ${formatBytes(sentBytes)}/${formatBytes(file.size)}`;
        }
    } catch (err) {
        console.error('Send error:', err);
        showToast('送信中にエラーが発生しました', 'error');
    }

    await sleep(400);
    progressEl.classList.add('hidden');
    fillEl.classList.remove('animate');
    fillEl.style.width = '0%';
    textEl.textContent = 'ファイルを送信';
    isSending = false;

    addFileToList({ name: file.name, size: file.size, data: URL.createObjectURL(file) }, true);
    showToast(`${file.name} を送信しました`, 'success');
}

// ═══════════════════════════════════════════════════════
//  RECEIVING
// ═══════════════════════════════════════════════════════
function handleIncomingChunk(chunkData) {
    const { fileId, fileName, fileSize, chunkIndex, totalChunks, data } = chunkData;

    if (!receivingFiles[fileId]) {
        receivingFiles[fileId] = {
            name: fileName, size: fileSize,
            chunks: new Array(totalChunks), receivedCount: 0
        };
    }

    receivingFiles[fileId].chunks[chunkIndex] = data;
    receivingFiles[fileId].receivedCount++;

    const pct = Math.round((receivingFiles[fileId].receivedCount / totalChunks) * 100);
    totalRecv += data.byteLength || (data.length || 0);
    updateStats();

    // Show receive progress
    const banner = document.getElementById('recv-progress-banner');
    banner.classList.add('visible');
    document.getElementById('recv-file-name').textContent = truncate(fileName, 20);
    document.getElementById('recv-pct').textContent = pct + '%';
    document.getElementById('recv-progress-fill').style.width = pct + '%';

    if (receivingFiles[fileId].receivedCount === totalChunks) {
        banner.classList.remove('visible');
        const blob = new Blob(receivingFiles[fileId].chunks);
        addFileToList({ name: fileName, size: fileSize, data: URL.createObjectURL(blob) }, false);
        delete receivingFiles[fileId];
        showToast(`${fileName} を受信しました`, 'success');
    }
}

// ═══════════════════════════════════════════════════════
//  FILE LIST
// ═══════════════════════════════════════════════════════
function addFileToList(file, isMe) {
    fileCount++;
    document.getElementById('file-count-badge').textContent = fileCount;

    const empty = document.getElementById('file-list-empty');
    if (empty) empty.remove();

    const ext = file.name.split('.').pop().toUpperCase().slice(0, 4);
    const item = document.createElement('div');
    item.className = 'file-item';
    item.innerHTML = `
        <div class="file-item-icon ${isMe ? 'sent' : 'recv'}">${ext || 'FILE'}</div>
        <div class="file-item-info">
            <div class="file-item-name">${escHtml(file.name)}</div>
            <div class="file-item-meta">${formatBytes(file.size)} · ${isMe ? '↑ 送信済み' : '↓ 受信済み'}</div>
        </div>
        <a href="${file.data}" download="${escHtml(file.name)}" class="btn-dl" title="ダウンロード">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="8 17 12 21 16 17"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.88 18.09A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.29"/></svg>
        </a>
    `;
    document.getElementById('file-list-items').prepend(item);
    updateStats();
}

// ═══════════════════════════════════════════════════════
//  TEXT SYNC
// ═══════════════════════════════════════════════════════
document.getElementById('sync-textarea').addEventListener('input', (e) => {
    clearTimeout(textSyncTimer);
    setSyncDot(true);
    textSyncTimer = setTimeout(() => {
        if (conn && conn.open) {
            conn.send({ type: 'text', payload: e.target.value });
        }
        setSyncDot(false);
    }, 150);
});

function setSyncDot(active) {
    const dot = document.getElementById('sync-dot');
    const label = document.getElementById('sync-label');
    dot.className = 'sync-dot' + (active ? ' syncing' : '');
    label.textContent = active ? 'SYNCING' : 'IDLE';
}

function flashSyncDot() {
    setSyncDot(true);
    setTimeout(() => setSyncDot(false), 600);
}

function copyAllText() {
    const area = document.getElementById('sync-textarea');
    navigator.clipboard.writeText(area.value).then(() => {
        showToast('テキストをコピーしました', 'success');
    }).catch(() => {
        area.select();
        document.execCommand('copy');
        showToast('テキストをコピーしました', 'success');
    });
}

function copyShareUrl(el) {
    const url = el.textContent;
    navigator.clipboard.writeText(url).then(() => showToast('URLをコピーしました', 'success'));
}

// ═══════════════════════════════════════════════════════
//  STATS
// ═══════════════════════════════════════════════════════
function updateStats() {
    document.getElementById('stat-sent').textContent = formatBytes(totalSent);
    document.getElementById('stat-recv').textContent = formatBytes(totalRecv);
    document.getElementById('stat-files').textContent = fileCount;
}

function startSpeedMeter() {
    clearInterval(speedTimer);
    lastSpeedBytes = totalSent + totalRecv;
    speedTimer = setInterval(() => {
        const now = totalSent + totalRecv;
        const speed = now - lastSpeedBytes;
        lastSpeedBytes = now;
        document.getElementById('stat-speed').textContent = speed > 0 ? `${formatBytes(speed)}/s` : '—';
    }, 1000);
}

// ═══════════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════════
function formatBytes(b) {
    if (b === 0) return '0 B';
    const u = ['B','KB','MB','GB'];
    const i = Math.floor(Math.log(b) / Math.log(1024));
    return (b / Math.pow(1024, i)).toFixed(i > 0 ? 1 : 0) + ' ' + u[i];
}

function truncate(str, n) {
    return str.length > n ? str.slice(0, n) + '…' : str;
}

function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
    document.getElementById('host-trigger').onclick = () => initiateHost();
    document.getElementById('join-trigger').onclick = () => initiateJoin();

    document.getElementById('join-code-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') initiateJoin();
    });

    // Format code input live
    document.getElementById('join-code-input').addEventListener('input', e => {
        let v = e.target.value.replace(/\D/g, '').slice(0, 8);
        e.target.value = v;
    });

    // URL join
    const params = new URLSearchParams(location.search);
    const joinCode = params.get('join');
    const session = getValidSession();

    if (joinCode) {
        document.getElementById('join-code-input').value = joinCode;
        initiateJoin(joinCode);
    } else if (session) {
        console.log('Resuming session:', session);
        if (session.role === 'host') initiateHost(session.myId);
        else if (session.role === 'join' && session.targetId) initiateJoin(session.targetId);
    }
});

// ─── Visibility change: reconnect on tab return ───
document.addEventListener('visibilitychange', () => {
    if (!document.hidden && conn && !conn.open && !isTerminating) {
        const session = getValidSession();
        if (session) scheduleReconnect();
    }
});

// ─── Keepalive ping ───
setInterval(() => {
    if (conn && conn.open) {
        try { conn.send({ type: 'ping', ts: Date.now() }); } catch {}
    }
}, 15000);
</script>
